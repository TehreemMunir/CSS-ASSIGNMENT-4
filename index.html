<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS ASSIGNMENT 4</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("IMAGES/Glittery Pink");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
        }

        .container {
            text-align: center;
            padding: 50px;
        }

        .card {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            margin-top: 0;
        }

        .pattern-box {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background-image: url(/IMAGES/pattern.png);
            background-repeat: repeat;
            background-size: 50px 50px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.7);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Background Cover</h2>
            <p>This card uses a semi-transparent background and a box-shadow.</p>
        </div>

        <div class="pattern-box"></div>
    </div>
</body>

</html>
